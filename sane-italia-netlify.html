<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.A.N.E. Italia – Sicurezza Alimentare Nutrizionale Educativa</title>
<meta name="description" content="Il primo programma scolastico che integra educazione nutrizionale e gestione allergie e intolleranze alimentari.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#2D5016;--gm:#4A7C2F;--gl:#8ABE6A;--cr:#F7F3EC;--tc:#C4622D;--or:#C9A84C;--wh:#FDFAF5;--gr:#6B6B6B}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--wh);color:var(--g);overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1rem 3rem;background:rgba(253,250,245,.94);backdrop-filter:blur(14px);border-bottom:1px solid rgba(45,80,22,.1);gap:1rem}
.logo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;letter-spacing:.08em;color:var(--g);text-decoration:none}
.logo span{color:var(--tc)}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{font-size:.8rem;font-weight:500;letter-spacing:.06em;text-decoration:none;color:var(--g);text-transform:uppercase;transition:color .2s}
.nav-links a:hover{color:var(--tc)}
.nav-right{display:flex;align-items:center;gap:1rem}
.lang-sw{display:flex;gap:.3rem}
.lb{background:none;border:1.5px solid rgba(45,80,22,.25);color:var(--g);font-size:.7rem;font-weight:600;letter-spacing:.08em;padding:.25rem .6rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;text-transform:uppercase}
.lb:hover,.lb.active{background:var(--g);color:var(--wh);border-color:var(--g)}
.nav-cta{background:var(--g);color:var(--wh);padding:.5rem 1.2rem;font-size:.8rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:background .2s;white-space:nowrap}
.nav-cta:hover{background:var(--tc)}
.nav-portale{background:transparent;color:var(--g);border:1.5px solid var(--g);padding:.45rem 1.1rem;font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:all .2s;white-space:nowrap}
.nav-portale:hover{background:var(--g);color:var(--wh)}

/* HERO */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;padding-top:4.5rem;overflow:hidden}
.hero-l{display:flex;flex-direction:column;justify-content:center;padding:4rem 3rem 4rem 4rem}
.eyebrow{font-size:.72rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--tc);margin-bottom:1.2rem}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,5vw,5rem);line-height:1.05;font-weight:900;color:var(--g)}
.hero-title .em{font-style:italic;color:var(--tc)}
.hero-sub{font-size:1rem;font-weight:300;line-height:1.75;color:var(--gr);margin-top:1.5rem;max-width:460px}
.hero-btns{display:flex;gap:.8rem;margin-top:2rem;flex-wrap:wrap}
.btn-p{background:var(--g);color:var(--wh);padding:.8rem 2rem;font-size:.88rem;font-weight:500;letter-spacing:.04em;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:background .2s,transform .15s}
.btn-p:hover{background:var(--tc);transform:translateY(-1px)}
.btn-s{background:transparent;color:var(--g);padding:.8rem 2rem;font-size:.88rem;font-weight:500;letter-spacing:.04em;border:1.5px solid var(--g);cursor:pointer;text-decoration:none;display:inline-block;transition:all .2s}
.btn-s:hover{border-color:var(--tc);color:var(--tc)}
.hero-r{background:var(--g);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.hero-r::before{content:'';position:absolute;width:450px;height:450px;border-radius:50%;background:radial-gradient(circle,rgba(138,190,106,.15) 0%,transparent 70%);top:-80px;right:-80px}
.hero-r::after{content:'';position:absolute;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.12) 0%,transparent 70%);bottom:-40px;left:40px}
.stats{position:relative;z-index:2;padding:3rem;display:flex;flex-direction:column;gap:1.2rem}
.stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);padding:1.5rem 1.8rem}
.stat-n{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:900;color:var(--or);line-height:1}
.stat-l{font-size:.82rem;color:rgba(255,255,255,.7);margin-top:.3rem;line-height:1.4}

/* ACRONYM */
.acr{background:var(--cr);border-top:3px solid var(--or);border-bottom:3px solid var(--or);display:grid;grid-template-columns:repeat(4,1fr);padding:2rem 3rem;gap:.8rem}
.acr-item{text-align:center}
.acr-l{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:900;color:var(--g);line-height:1}
.acr-w{font-size:.75rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--tc);margin-top:.25rem}
.acr-d{font-size:.74rem;color:var(--gr);margin-top:.25rem;line-height:1.4}

/* SECTIONS */
section{padding:4.5rem 4rem}
.sec-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3vw,2.8rem);font-weight:700;line-height:1.15;color:var(--g);max-width:700px}
.sec-title .em{font-style:italic}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center}
.about-text p{font-size:.98rem;line-height:1.8;color:var(--gr);margin-top:1.2rem}
.about-text strong{color:var(--g)}
.badge{background:var(--g);color:var(--wh);padding:2rem;margin-bottom:1.2rem}
.badge-label{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gl);margin-bottom:.4rem}
.badge-val{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;line-height:1.3}
.badge-sub{font-size:.82rem;color:rgba(255,255,255,.65);margin-top:.25rem}
.badge-alt{background:var(--cr);color:var(--g);border-left:4px solid var(--or)}
.badge-alt .badge-label{color:var(--tc)}
.badge-alt .badge-val{color:var(--g)}
.badge-alt .badge-sub{color:var(--gr)}

/* GAME */
.game-sec{background:var(--cr)}
.game-intro{font-size:.98rem;color:var(--gr);margin-top:1rem;max-width:600px;line-height:1.7}
.game-inner{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start;margin-top:2.5rem}
.game-cards{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.game-card{background:var(--wh);padding:1.5rem;border-top:3px solid var(--gl);transition:border-color .2s,transform .2s}
.game-card:hover{border-color:var(--tc);transform:translateY(-3px)}
.game-icon{font-size:1.8rem;margin-bottom:.6rem}
.game-card h4{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--g);margin-bottom:.4rem}
.game-card p{font-size:.82rem;color:var(--gr);line-height:1.5}
.allergen-box{background:var(--g);padding:2rem;color:var(--wh)}
.allergen-box h4{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;margin-bottom:.5rem}
.allergen-box p{font-size:.82rem;color:rgba(255,255,255,.65);margin-bottom:1.2rem;line-height:1.5}
.allergen-tags{display:flex;flex-wrap:wrap;gap:.4rem}
.tag{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);padding:.3rem .7rem;font-size:.72rem;color:rgba(255,255,255,.85);letter-spacing:.04em;transition:background .2s}
.tag:hover{background:var(--tc);border-color:var(--tc)}

/* TARGET */
.target-sec{background:#F0EDE5}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:2.5rem}
.card{background:var(--wh);padding:2rem;border-top:3px solid var(--gl);transition:border-color .2s,transform .2s}
.card:hover{border-color:var(--tc);transform:translateY(-4px)}
.card-icon{font-size:1.8rem;margin-bottom:.8rem}
.card h3{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--g);margin-bottom:.6rem}
.card p{font-size:.88rem;line-height:1.65;color:var(--gr)}
.card ul{font-size:.84rem;color:var(--gr);margin-top:.7rem;padding-left:1.1rem}
.card ul li{margin-bottom:.35rem;line-height:1.5}

/* METHOD */
.method-sec{background:var(--g);color:var(--wh)}
.method-sec .sec-title{color:var(--wh);max-width:100%}
.method-sec .eyebrow{color:var(--gl)}
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-top:2.5rem}
.step{background:rgba(255,255,255,.04);padding:2rem 1.5rem;border:1px solid rgba(255,255,255,.1)}
.step-n{font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:900;color:var(--or);opacity:.35;line-height:1;margin-bottom:.8rem}
.step h4{font-size:.95rem;font-weight:500;color:var(--wh);margin-bottom:.5rem}
.step p{font-size:.82rem;color:rgba(255,255,255,.58);line-height:1.6}

/* SERAFINA */
.ser-grid{display:grid;grid-template-columns:1fr 2fr;gap:5rem;align-items:start}
.ser-card{background:var(--g);padding:2.5rem;text-align:center;color:var(--wh)}
.ser-init{width:90px;height:90px;border-radius:50%;background:var(--or);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;color:var(--g);margin:0 auto 1.2rem}
.ser-name{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700}
.ser-role{font-size:.82rem;color:var(--gl);margin-top:.25rem}
.ser-creds{margin-top:1.2rem;display:flex;flex-direction:column;gap:.5rem;text-align:left}
.ser-cred{font-size:.78rem;padding:.5rem .7rem;background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);border-left:2px solid var(--or)}
.ser-content{padding-top:.5rem}
.ser-content .sec-title{margin-bottom:1.2rem}
.ser-content p{font-size:.98rem;line-height:1.8;color:var(--gr);margin-bottom:.9rem}

/* TEAM */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:2rem}
.team-card{background:var(--g);color:var(--wh);padding:2.5rem}
.team-card-alt{background:var(--cr);color:var(--g)}
.team-top{display:flex;gap:1.2rem;align-items:center;margin-bottom:1.5rem}
.team-card .ser-name{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700}
.team-card .ser-role{font-size:.82rem;color:var(--gl);margin-top:.2rem}
.team-card-alt .ser-role{color:var(--tc)}
.team-card .ser-creds .ser-cred{border-left-color:var(--or)}
.team-card-alt .ser-creds .ser-cred{background:rgba(45,80,22,.07);color:var(--g);border-left-color:var(--tc)}
.pat-init{background:var(--tc)}
.team-bio{font-size:.9rem;line-height:1.75;margin-top:.9rem}
.team-card .team-bio{color:rgba(255,255,255,.72)}
.team-card-alt .team-bio{color:var(--gr)}
#team{background:var(--wh)}
@media(max-width:860px){.team-grid{grid-template-columns:1fr}}

/* PARTNER */
.partner-sec{background:var(--cr);text-align:center}
.partner-list{display:flex;gap:3rem;justify-content:center;flex-wrap:wrap;margin-top:2.5rem}
.partner-item{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--g);opacity:.45;letter-spacing:.05em;cursor:default;transition:opacity .2s}
.partner-item:hover{opacity:1}

/* CONTACT */
.contact-sec{background:var(--g);color:var(--wh);display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.contact-sec .sec-title{color:var(--wh)}
.contact-sec .eyebrow{color:var(--gl)}
.contact-sec .desc{color:rgba(255,255,255,.65);margin-top:1.2rem;line-height:1.8;font-size:.98rem}
.contact-items{display:flex;flex-direction:column;gap:.8rem}
.ci{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);padding:1.2rem 1.5rem;display:flex;gap:1.2rem;align-items:center}
.ci-link{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);padding:1.2rem 1.5rem;display:flex;gap:1.2rem;align-items:center;text-decoration:none;transition:background .2s,border-color .2s;cursor:pointer;}
.ci-link:hover{background:rgba(255,255,255,.14);border-color:var(--gl);}
.ci-icon{font-size:1.3rem}
.ci-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;color:var(--gl)}
.ci-value{font-size:.9rem;color:var(--wh);margin-top:.15rem}

footer{background:#1A2F0A;color:rgba(255,255,255,.38);padding:1.8rem 4rem;display:flex;justify-content:space-between;align-items:center;font-size:.75rem;letter-spacing:.04em}
footer strong{color:rgba(255,255,255,.65)}
footer a{color:rgba(255,255,255,.38);text-decoration:none}

@media(max-width:860px){
  nav{padding:.9rem 1.2rem}
  .nav-links{display:none}
  .hero{grid-template-columns:1fr}
  .hero-r{display:none}
  .hero-l{padding:5.5rem 1.5rem 2.5rem}
  .acr{grid-template-columns:repeat(2,1fr);padding:1.5rem}
  section{padding:2.5rem 1.5rem}
  .about-grid,.ser-grid,.contact-sec{grid-template-columns:1fr;gap:2rem}
  .game-inner{grid-template-columns:1fr;gap:2rem}
  .game-cards{grid-template-columns:1fr 1fr}
  .cards-grid{grid-template-columns:1fr}
  .steps{grid-template-columns:repeat(2,1fr)}
  footer{flex-direction:column;gap:.8rem;text-align:center;padding:1.5rem}
}
</style>
</head>

<nav>

<script>
const T = {
  it: {
    nav:["Chi siamo","Il programma","Il metodo","Il team"],

    about_eyebrow:"Chi siamo",

let lang = 'it';

function render(l) {
  const t = T[l];
  document.documentElement.lang = l;

  // nav links
  document.querySelectorAll('[data-k]').forEach(el => {
    const k = el.getAttribute('data-k');
    if (k.startsWith('nav') && k !== 'nav_cta') {
      const i = parseInt(k.replace('nav',''));
      if (!isNaN(i)) { el.textContent = t.nav[i]; return; }
    }
    if (T[l][k] !== undefined) el.innerHTML = T[l][k];
  });

  // lang buttons
  document.querySelectorAll('.lb').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === l));

  // acronym
  document.getElementById('acr-strip').innerHTML = t.acr.map(a =>
    `<div class="acr-item"><div class="acr-l">${a.l}</div><div class="acr-w">${a.w}</div><div class="acr-d">${a.d}</div></div>`
  ).join('');

  // game cards
  document.getElementById('game-cards').innerHTML = t.games.map(g =>
    `<div class="game-card"><div class="game-icon">${g.icon}</div><h4>${g.name}</h4><p>${g.desc}</p></div>`
  ).join('');

  // allergens
  document.getElementById('allergen-tags').innerHTML = t.allergens.map(a =>
    `<span class="tag">${a}</span>`
  ).join('');

  // cards grid
  document.getElementById('cards-grid').innerHTML = t.cards.map(c =>
    `<div class="card"><div class="card-icon">${c.icon}</div><h3>${c.title}</h3><p>${c.desc}</p><ul>${c.li.map(l=>`<li>${l}</li>`).join('')}</ul></div>`
  ).join('');

  // steps
  document.getElementById('steps').innerHTML = t.steps.map(s =>
    `<div class="step"><div class="step-n">${s.n}</div><h4>${s.t}</h4><p>${s.d}</p></div>`
  ).join('');

  // ser creds
  document.getElementById('ser-creds').innerHTML = t.ser_creds.map(c =>
    `<div class="ser-cred">${c}</div>`
  ).join('');

  // pat creds
  document.getElementById('pat-creds').innerHTML = t.pat_creds.map(c =>
    `<div class="ser-cred">${c}</div>`
  ).join('');

  // partners
  document.getElementById('partner-list').innerHTML = t.partners.map(p =>
    `<div class="partner-item">${p}</div>`
  ).join('');

  // contact items
  document.getElementById('contact-items').innerHTML = t.ci.map(c =>
    c.href
      ? `<a href="${c.href}" class="ci ci-link"><div class="ci-icon">${c.icon}</div><div><div class="ci-label">${c.label}</div><div class="ci-value">${c.value} →</div></div></a>`
      : `<div class="ci"><div class="ci-icon">${c.icon}</div><div><div class="ci-label">${c.label}</div><div class="ci-value">${c.value}</div></div></div>`
  ).join('');
}

function setLang(l) { lang = l; render(l); }

render('it');
</script>
