<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#0A2647;        /* navy — primary brand */
  --gm:#00A896;       /* teal */
  --gl:#00C9B1;       /* teal-light */
  --cr:#EEF5FA;       /* light blue-tint background */
  --tc:#F4A261;       /* warm accent orange */
  --or:#C9A84C;       /* gold for stat numbers */
  --wh:#F5F9FC;       /* cool off-white */
  --gr:#5A6A7A;       /* blue-gray body text */
  --dn:#061828;       /* deep navy for footer */
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--wh);color:var(--g);overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:.9rem 3rem;background:rgba(10,38,71,.97);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,168,150,.2);gap:1rem}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo img{height:38px;width:auto}
.logo-text{font-family:'Inter',sans-serif;font-size:1.05rem;font-weight:700;color:#fff;letter-spacing:.03em}
.logo-text span{color:var(--gl)}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{font-size:.76rem;font-weight:500;letter-spacing:.08em;text-decoration:none;color:rgba(255,255,255,.65);text-transform:uppercase;transition:color .2s}
.nav-links a:hover{color:var(--gl)}
.nav-right{display:flex;align-items:center;gap:.9rem}
.lang-sw{display:flex;gap:.3rem}
.lb{background:none;border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.7);font-size:.68rem;font-weight:600;letter-spacing:.08em;padding:.22rem .55rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;text-transform:uppercase;border-radius:3px}
.lb:hover,.lb.active{background:var(--gm);color:#fff;border-color:var(--gm)}
.nav-cta{background:var(--gm);color:#fff;padding:.48rem 1.2rem;font-size:.76rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:background .2s,transform .15s;border-radius:6px;white-space:nowrap}
.nav-cta:hover{background:var(--gl);transform:translateY(-1px)}
.nav-portale{background:transparent;color:rgba(255,255,255,.8);border:1.5px solid rgba(255,255,255,.3);padding:.44rem 1rem;font-size:.72rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:all .2s;border-radius:6px;white-space:nowrap}
.nav-portale:hover{background:rgba(255,255,255,.1);border-color:var(--gl);color:#fff}

/* HERO */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;padding-top:4.5rem;overflow:hidden}
.hero-l{display:flex;flex-direction:column;justify-content:center;padding:4rem 3rem 4rem 4rem}
.eyebrow{font-size:.7rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gm);margin-bottom:1.2rem}
.hero-title{font-family:'Inter',sans-serif;font-size:clamp(2.4rem,4.5vw,4.2rem);line-height:1.08;font-weight:800;color:var(--g)}
.hero-title .em{color:var(--gm)}
.hero-sub{font-size:.98rem;font-weight:400;line-height:1.8;color:var(--gr);margin-top:1.5rem;max-width:460px}
.hero-btns{display:flex;gap:.8rem;margin-top:2.2rem;flex-wrap:wrap}
.btn-p{background:var(--g);color:#fff;padding:.8rem 2rem;font-size:.86rem;font-weight:600;letter-spacing:.04em;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:background .2s,transform .15s;border-radius:8px}
.btn-p:hover{background:var(--gm);transform:translateY(-2px)}
.btn-s{background:transparent;color:var(--g);padding:.8rem 2rem;font-size:.86rem;font-weight:600;letter-spacing:.04em;border:2px solid var(--g);cursor:pointer;text-decoration:none;display:inline-block;transition:all .2s;border-radius:8px}
.btn-s:hover{border-color:var(--gm);color:var(--gm)}
.hero-r{background:linear-gradient(135deg,var(--g) 0%,#0d3460 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.hero-r::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,168,150,.18) 0%,transparent 70%);top:-120px;right:-120px}
.hero-r::after{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(0,201,177,.1) 0%,transparent 70%);bottom:-60px;left:30px}
.stats{position:relative;z-index:2;padding:3rem;display:flex;flex-direction:column;gap:1.4rem;width:100%}
.stat{background:rgba(255,255,255,.05);border:1px solid rgba(0,168,150,.25);padding:1.5rem 1.8rem;border-radius:12px;transition:border-color .2s}
.stat:hover{border-color:rgba(0,168,150,.55)}
.stat-n{font-family:'Inter',sans-serif;font-size:2.6rem;font-weight:800;color:var(--gl);line-height:1}
.stat-l{font-size:.8rem;color:rgba(255,255,255,.65);margin-top:.4rem;line-height:1.5}

/* ACRONYM */
.acr{background:var(--g);border-top:3px solid var(--gm);border-bottom:3px solid var(--gm);display:grid;grid-template-columns:repeat(4,1fr);padding:2rem 3rem;gap:.8rem}
.acr-item{text-align:center}
.acr-l{font-family:'Inter',sans-serif;font-size:2.4rem;font-weight:800;color:var(--gl);line-height:1}
.acr-w{font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.8);margin-top:.25rem}
.acr-d{font-size:.72rem;color:rgba(255,255,255,.45);margin-top:.25rem;line-height:1.4}

/* SECTIONS */
section{padding:4.5rem 4rem}
.sec-title{font-family:'Inter',sans-serif;font-size:clamp(1.6rem,2.8vw,2.4rem);font-weight:700;line-height:1.15;color:var(--g);max-width:700px}
.sec-title em{font-style:normal;color:var(--gm)}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center}
.about-text p{font-size:.97rem;line-height:1.85;color:var(--gr);margin-top:1.2rem}
.about-text strong{color:var(--g)}
.badge{background:var(--g);color:#fff;padding:2rem;margin-bottom:1.2rem;border-radius:12px}
.badge-label{font-size:.65rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gl);margin-bottom:.4rem}
.badge-val{font-family:'Inter',sans-serif;font-size:1.15rem;font-weight:700;line-height:1.3}
.badge-sub{font-size:.8rem;color:rgba(255,255,255,.6);margin-top:.25rem}
.badge-alt{background:var(--cr);color:var(--g);border-left:4px solid var(--gm)}
.badge-alt .badge-label{color:var(--gm)}
.badge-alt .badge-val{color:var(--g)}
.badge-alt .badge-sub{color:var(--gr)}

/* GAME */
.game-sec{background:var(--cr)}
.game-intro{font-size:.97rem;color:var(--gr);margin-top:1rem;max-width:600px;line-height:1.75}
.game-inner{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start;margin-top:2.5rem}
.game-cards{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.game-card{background:#fff;padding:1.5rem;border-top:3px solid var(--gl);transition:border-color .2s,transform .2s;border-radius:0 0 8px 8px;box-shadow:0 2px 12px rgba(10,38,71,.06)}
.game-card:hover{border-color:var(--gm);transform:translateY(-3px)}
.game-icon{font-size:1.8rem;margin-bottom:.6rem}
.game-card h4{font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;color:var(--g);margin-bottom:.4rem}
.game-card p{font-size:.8rem;color:var(--gr);line-height:1.5}
.allergen-box{background:var(--g);padding:2rem;color:#fff;border-radius:12px}
.allergen-box h4{font-family:'Inter',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:.5rem}
.allergen-box p{font-size:.8rem;color:rgba(255,255,255,.6);margin-bottom:1.2rem;line-height:1.5}
.allergen-tags{display:flex;flex-wrap:wrap;gap:.4rem}
.tag{background:rgba(0,168,150,.15);border:1px solid rgba(0,168,150,.3);padding:.3rem .7rem;font-size:.7rem;color:var(--gl);letter-spacing:.04em;border-radius:4px;transition:background .2s}
.tag:hover{background:var(--gm);border-color:var(--gm);color:#fff}

/* TARGET */
.target-sec{background:#fff}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:2.5rem}
.card{background:var(--wh);padding:2rem;border-top:3px solid var(--gl);transition:border-color .2s,transform .2s;border-radius:0 0 10px 10px;box-shadow:0 2px 16px rgba(10,38,71,.06)}
.card:hover{border-color:var(--gm);transform:translateY(-4px)}
.card-icon{font-size:1.8rem;margin-bottom:.8rem}
.card h3{font-family:'Inter',sans-serif;font-size:1.1rem;font-weight:700;color:var(--g);margin-bottom:.6rem}
.card p{font-size:.86rem;line-height:1.7;color:var(--gr)}
.card ul{font-size:.82rem;color:var(--gr);margin-top:.7rem;padding-left:1.1rem}
.card ul li{margin-bottom:.35rem;line-height:1.5}

/* METHOD */
.method-sec{background:var(--g);color:#fff}
.method-sec .sec-title{color:#fff;max-width:100%}
.method-sec .eyebrow{color:var(--gl)}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:2.5rem}
.step{background:rgba(255,255,255,.04);padding:2rem 1.5rem;border:1px solid rgba(0,168,150,.15);transition:background .2s}
.step:hover{background:rgba(0,168,150,.08)}
.step-n{font-family:'Inter',sans-serif;font-size:2.8rem;font-weight:800;color:var(--gl);opacity:.35;line-height:1;margin-bottom:.8rem}
.step h4{font-size:.92rem;font-weight:600;color:#fff;margin-bottom:.5rem}
.step p{font-size:.8rem;color:rgba(255,255,255,.55);line-height:1.65}

/* TEAM */
.ser-init{width:68px;height:68px;border-radius:50%;background:var(--gl);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:1.4rem;font-weight:800;color:var(--g);flex-shrink:0;overflow:hidden;border:3px solid rgba(255,255,255,.15)}
.ser-init img{width:100%;height:100%;object-fit:cover;object-position:center top;border-radius:50%}
.ser-name{font-family:'Inter',sans-serif;font-size:1.2rem;font-weight:700}
.ser-role{font-size:.78rem;color:var(--gl);margin-top:.2rem;letter-spacing:.04em}
.ser-creds{margin-top:1.2rem;display:flex;flex-direction:column;gap:.5rem;text-align:left}
.ser-cred{font-size:.76rem;padding:.5rem .7rem;background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);border-left:2px solid var(--gl);border-radius:0 4px 4px 0}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:2rem}
.team-card{background:var(--g);color:#fff;padding:2.5rem;border-radius:16px}
.team-card-alt{background:var(--cr);color:var(--g)}
.team-top{display:flex;gap:1.2rem;align-items:center;margin-bottom:1.5rem}
.team-card-alt .ser-init{background:var(--tc);color:#fff}
.team-card-alt .ser-name{color:var(--g)}
.team-card-alt .ser-role{color:var(--gm)}
.team-card-alt .ser-creds .ser-cred{background:rgba(10,38,71,.07);color:var(--g);border-left-color:var(--gm)}
.team-bio{font-size:.88rem;line-height:1.8;margin-top:.9rem}
.team-card .team-bio{color:rgba(255,255,255,.7)}
.team-card-alt .team-bio{color:var(--gr)}
#team{background:var(--wh)}
@media(max-width:860px){.team-grid{grid-template-columns:1fr}}

/* PARTNER */
.partner-sec{background:var(--g);text-align:center}
.partner-sec .sec-title{color:#fff;margin:0 auto}
.partner-sec .eyebrow{color:var(--gl)}
.partner-list{display:flex;gap:3rem;justify-content:center;flex-wrap:wrap;margin-top:2.5rem}
.partner-item{font-family:'Inter',sans-serif;font-size:.95rem;font-weight:600;color:rgba(255,255,255,.4);letter-spacing:.05em;cursor:default;transition:color .2s}
.partner-item:hover{color:var(--gl)}

/* CONTACT */
.contact-sec{background:var(--g);color:#fff;padding:4.5rem 4rem}
.contact-sec .sec-title{color:#fff;max-width:100%}
.contact-sec .eyebrow{color:var(--gl)}
.contact-sec .desc{color:rgba(255,255,255,.6);margin-top:1rem;line-height:1.8;font-size:.95rem;max-width:600px}
.contact-cards{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:2.5rem}
.cc{background:rgba(255,255,255,.06);border:1px solid rgba(0,201,177,.2);border-radius:16px;padding:1.8rem 2rem;transition:border-color .2s,background .2s}
.cc:hover{background:rgba(255,255,255,.1);border-color:var(--gl)}
.cc-head{display:flex;align-items:center;gap:.8rem;margin-bottom:1.2rem}
.cc-avatar{width:44px;height:44px;border-radius:50%;overflow:hidden;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:var(--g);flex-shrink:0}
.cc-avatar img{width:100%;height:100%;object-fit:cover;object-position:top}
.cc-name{font-size:.95rem;font-weight:700;color:#fff;line-height:1.2}
.cc-role{font-size:.7rem;color:var(--gl);margin-top:.15rem;letter-spacing:.03em}
.cc-lines{display:flex;flex-direction:column;gap:.5rem}
.cc-line{display:flex;align-items:center;gap:.6rem;font-size:.82rem;color:rgba(255,255,255,.75)}
.cc-line a{color:rgba(255,255,255,.75);text-decoration:none;transition:color .2s}
.cc-line a:hover{color:var(--gl)}
.cc-socials{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.8rem;padding-top:.8rem;border-top:1px solid rgba(255,255,255,.1)}
.cc-social{font-size:.78rem;color:rgba(255,255,255,.6);text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;transition:color .2s;font-weight:500}
.cc-social:hover{color:var(--gl)}
.cc-portal{grid-column:1/-1;background:rgba(0,201,177,.12);border-color:var(--gl);text-decoration:none;display:flex;align-items:center;justify-content:space-between;padding:1.4rem 2rem}
.cc-portal:hover{background:rgba(0,201,177,.22)}
.cc-portal-text{font-size:.95rem;font-weight:600;color:#fff}
.cc-portal-sub{font-size:.78rem;color:rgba(255,255,255,.5);margin-top:.2rem}
.cc-arrow{font-size:1.4rem;color:var(--gl)}

footer{background:var(--dn);color:rgba(255,255,255,.35);padding:1.8rem 4rem;display:flex;justify-content:space-between;align-items:center;font-size:.72rem;letter-spacing:.05em}
footer strong{color:rgba(255,255,255,.7)}
footer a{color:rgba(255,255,255,.35);text-decoration:none;transition:color .2s}
footer a:hover{color:var(--gl)}

@media(max-width:860px){
  nav{padding:.8rem 1.2rem}
  .nav-links{display:none}
  .hero{grid-template-columns:1fr}
  .hero-r{display:none}
  .hero-l{padding:5.5rem 1.5rem 2.5rem}
  .acr{grid-template-columns:repeat(2,1fr);padding:1.5rem}
  section{padding:2.5rem 1.5rem}
  .contact-sec{padding:2.5rem 1.5rem}
  .contact-cards{grid-template-columns:1fr}
  .about-grid{grid-template-columns:1fr;gap:2rem}
  .game-inner{grid-template-columns:1fr;gap:2rem}
  .game-cards{grid-template-columns:1fr 1fr}
  .cards-grid{grid-template-columns:1fr}
  .steps{grid-template-columns:repeat(2,1fr)}
  footer{flex-direction:column;gap:.8rem;text-align:center;padding:1.5rem}
}
</style>
</head>

<!-- NAV -->
<nav>
  <a href="#" class="logo">

    <a href="portale.html" class="nav-portale">🔐 Portale</a>
    <a href="#contact" class="nav-cta" data-k="nav_cta"></a>

</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-l">
    <p class="eyebrow" data-k="hero_eyebrow"></p>
    <h1 class="hero-title" data-k="hero_title"></h1>
    <p class="hero-sub" data-k="hero_sub"></p>
    <div class="hero-btns">
      <a href="https://ilpiattosano.netlify.app" target="_blank" class="btn-p" data-k="hero_btn1"></a>

<!-- ACRONYM -->

<!-- ABOUT -->
<section id="about">
  <div class="about-grid">
    <div class="about-text">
      <p class="eyebrow" data-k="about_eyebrow"></p>
      <h2 class="sec-title" data-k="about_title"></h2>
      <p data-k="about_p1"></p>
      <p data-k="about_p2"></p>
      <p data-k="about_p3"></p>

let lang = 'it';

function render(l) {
  const t = T[l];
  document.documentElement.lang = l;

  // nav links
  document.querySelectorAll('[data-k]').forEach(el => {
    const k = el.getAttribute('data-k');
    if (k.startsWith('nav') && k !== 'nav_cta') {
      const i = parseInt(k.replace('nav',''));
      if (!isNaN(i)) { el.textContent = t.nav[i]; return; }
    }
    if (T[l][k] !== undefined) el.innerHTML = T[l][k];
  });

  // lang buttons
  document.querySelectorAll('.lb').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === l));

  // acronym
  document.getElementById('acr-strip').innerHTML = t.acr.map(a =>
    `<div class="acr-item"><div class="acr-l">${a.l}</div><div class="acr-w">${a.w}</div><div class="acr-d">${a.d}</div></div>`
  ).join('');

  // game cards
  document.getElementById('game-cards').innerHTML = t.games.map(g =>
    `<div class="game-card"><div class="game-icon">${g.icon}</div><h4>${g.name}</h4><p>${g.desc}</p></div>`
  ).join('');

  // allergens
  document.getElementById('allergen-tags').innerHTML = t.allergens.map(a =>
    `<span class="tag">${a}</span>`
  ).join('');

  // cards grid
  document.getElementById('cards-grid').innerHTML = t.cards.map(c =>
    `<div class="card"><div class="card-icon">${c.icon}</div><h3>${c.title}</h3><p>${c.desc}</p><ul>${c.li.map(l=>`<li>${l}</li>`).join('')}</ul></div>`
  ).join('');

  // steps
  document.getElementById('steps').innerHTML = t.steps.map(s =>
    `<div class="step"><div class="step-n">${s.n}</div><h4>${s.t}</h4><p>${s.d}</p></div>`
  ).join('');

  // ser creds
  document.getElementById('ser-creds').innerHTML = t.ser_creds.map(c =>
    `<div class="ser-cred">${c}</div>`
  ).join('');

  // pat creds
  document.getElementById('pat-creds').innerHTML = t.pat_creds.map(c =>
    `<div class="ser-cred">${c}</div>`
  ).join('');

  // contact cards
  document.getElementById('contact-cards').innerHTML = t.ci.map(c => {
    if (c.type === 'person') {
      return `<div class="cc">
        <div class="cc-head">
          <div class="cc-avatar"><img src="${c.img}" alt="${c.name}"></div>
          <div><div class="cc-name">${c.name}</div><div class="cc-role">${c.role}</div></div>
        </div>
        <div class="cc-lines">
          <div class="cc-line">📧 <a href="mailto:${c.email}">${c.email}</a></div>
          <div class="cc-line">📞 <a href="tel:${c.tel.replace(/\s/g,'')}">${c.tel}</a></div>
          ${c.address ? `<div class="cc-line">📍 ${c.address}</div>` : ''}
          ${c.site ? `<div class="cc-line">🌐 <a href="${c.site}" target="_blank">${c.sitelabel}</a></div>` : ''}
        </div>
        <div class="cc-socials">
          ${c.ig ? `<a href="${c.ig}" target="_blank" class="cc-social"><i class="fab fa-instagram"></i> Instagram</a>` : ''}
          ${c.fb ? `<a href="${c.fb}" target="_blank" class="cc-social"><i class="fab fa-facebook"></i> Facebook</a>` : ''}
          ${c.li ? `<a href="${c.li}" target="_blank" class="cc-social"><i class="fab fa-linkedin"></i> LinkedIn</a>` : ''}
        </div>
      </div>`;
    }
    if (c.type === 'portal') {
      return `<a href="${c.href}" class="cc cc-portal">
        <div><div class="cc-portal-text">🔐 ${c.label}</div><div class="cc-portal-sub">${c.sub}</div></div>
        <div class="cc-arrow">→</div>
      </a>`;
    }
    return '';
  }).join('');
}

function setLang(l) { lang = l; render(l); }

render('it');
</script>
