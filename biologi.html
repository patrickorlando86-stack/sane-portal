*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--wh);color:var(--g);overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;justify-content:space-between;align-items:center;padding:.9rem 3rem;background:rgba(10,38,71,.97);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,168,150,.2);gap:1rem}

.logo-text{font-family:'Inter',sans-serif;font-size:1.05rem;font-weight:700;color:#fff;letter-spacing:.03em}
.logo-text span{color:var(--gl)}
.nav-links{display:flex;gap:1.5rem;list-style:none}
.nav-links a{font-size:.76rem;font-weight:500;letter-spacing:.08em;text-decoration:none;color:rgba(255,255,255,.65);text-transform:uppercase;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--gl)}
.nav-right{display:flex;align-items:center;gap:.9rem}
.lang-sw{display:flex;gap:.3rem}
.lb{background:none;border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.7);font-size:.68rem;font-weight:600;letter-spacing:.08em;padding:.22rem .55rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;text-transform:uppercase;border-radius:3px}
.lb:hover,.lb.active{background:var(--gm);color:#fff;border-color:var(--gm)}
.nav-cta{background:var(--gm);color:#fff;padding:.48rem 1.2rem;font-size:.76rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:background .2s,transform .15s;border-radius:6px;white-space:nowrap}
.nav-cta:hover{background:var(--gl);transform:translateY(-1px)}
.nav-portale{background:transparent;color:rgba(255,255,255,.8);border:1.5px solid rgba(255,255,255,.3);padding:.44rem 1rem;font-size:.72rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;transition:all .2s;border-radius:6px;white-space:nowrap}
.nav-portale:hover{background:rgba(255,255,255,.1);border-color:var(--gl);color:#fff}

/* HERO */
.page-hero{background:linear-gradient(135deg,var(--g) 0%,#0d3460 100%);padding:8rem 4rem 5rem;position:relative;overflow:hidden}
.page-hero::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,168,150,.14) 0%,transparent 70%);top:-200px;right:-100px;pointer-events:none}
.page-hero::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,201,177,.08) 0%,transparent 70%);bottom:-100px;left:5%;pointer-events:none}
.hero-inner{position:relative;z-index:2;max-width:760px}
.eyebrow{font-size:.7rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gm);margin-bottom:1.2rem}
.page-hero .eyebrow{color:var(--gl)}
.page-hero-title{font-family:'Inter',sans-serif;font-size:clamp(2.2rem,4vw,3.8rem);line-height:1.08;font-weight:800;color:#fff;margin-bottom:1.2rem}

.page-hero-sub{font-size:1.05rem;font-weight:600;color:rgba(255,255,255,.85);margin-bottom:.9rem;line-height:1.5}
.page-hero-desc{font-size:.95rem;color:rgba(255,255,255,.6);line-height:1.85;max-width:640px}

/* STATS */
.stats-sec{background:#fff;padding:3.5rem 4rem}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:2rem}
.stat-card{background:var(--g);padding:2.2rem 2rem;border-radius:14px;text-align:center;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;width:120px;height:120px;border-radius:50%;background:rgba(0,201,177,.08);top:-30px;right:-30px;pointer-events:none}
.stat-num{font-family:'Inter',sans-serif;font-size:3rem;font-weight:800;color:var(--gl);line-height:1;margin-bottom:.5rem}
.stat-label{font-size:.82rem;color:rgba(255,255,255,.65);line-height:1.5;font-weight:500}

/* SEZIONI */
.sec-desc{font-size:.92rem;color:var(--gr);margin-top:.8rem;line-height:1.8;max-width:640px}

.map-sec{background:var(--cr);padding:4rem}

.legend-dot{width:14px;height:14px;border-radius:2px;flex-shrink:0}
.legend-dot.attivo{background:var(--gm)}
.legend-dot.espansione{background:#94a3b8}
#mappa-biologi{width:100%;height:500px;border-radius:14px;border:1px solid rgba(10,38,71,.1);box-shadow:0 4px 24px rgba(10,38,71,.08)}

.biologi-sec{background:#fff;padding:4rem}

.biologo-card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(10,38,71,.12)}
.biologo-top{background:linear-gradient(135deg,var(--g),#0d3460);padding:2rem;display:flex;flex-direction:column;align-items:center;text-align:center;gap:.8rem}
.biologo-avatar{width:72px;height:72px;border-radius:50%;background:var(--gl);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:1.5rem;font-weight:800;color:var(--g);overflow:hidden;border:3px solid rgba(255,255,255,.2)}

.biologo-nome{font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;color:#fff;line-height:1.3}
.biologo-titolo{font-size:.75rem;color:var(--gl);font-weight:500;letter-spacing:.03em}
.biologo-body{padding:1.4rem;flex:1;display:flex;flex-direction:column;gap:.6rem}
.biologo-ruolo{font-size:.82rem;font-weight:600;color:var(--g);line-height:1.4}
.biologo-regione{font-size:.76rem;color:var(--gr);display:flex;align-items:center;gap:.4rem}
.biologo-spec{font-size:.76rem;color:var(--gr);line-height:1.55;padding-top:.4rem;border-top:1px solid rgba(10,38,71,.07)}
.cert-badge{display:inline-flex;align-items:center;gap:.35rem;background:rgba(0,168,150,.1);border:1px solid rgba(0,168,150,.25);color:var(--gm);font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.3rem .7rem;border-radius:20px;margin-top:auto;align-self:flex-start}

/* NOTA CONTATTI */
.nota-sec{background:var(--g);padding:2.5rem 4rem}
.nota-box{background:rgba(0,201,177,.1);border:1.5px solid var(--gl);border-radius:14px;padding:1.8rem 2.2rem;display:flex;gap:1.4rem;align-items:flex-start}
.nota-icon{font-size:1.8rem;flex-shrink:0;margin-top:.1rem}
.nota-text{font-size:.9rem;color:rgba(255,255,255,.8);line-height:1.8}
.nota-text strong{color:#fff}

/* CANDIDATURA */
.candidatura-sec{background:var(--cr);padding:4rem}
.candidatura-inner{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.candidatura-text .sec-title{max-width:100%}

.candidatura-card-title{font-family:'Inter',sans-serif;font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:.6rem}
.candidatura-card-sub{font-size:.83rem;color:rgba(255,255,255,.6);margin-bottom:1.6rem;line-height:1.7}
.req-list{list-style:none;display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.8rem}
.req-list li{font-size:.82rem;color:rgba(255,255,255,.75);display:flex;align-items:flex-start;gap:.5rem;line-height:1.5}
.req-list li::before{content:"→";color:var(--gl);font-weight:700;flex-shrink:0}
.cand-btns{display:flex;flex-direction:column;gap:.7rem}
.btn-cta{display:inline-block;background:var(--gm);color:#fff;padding:.8rem 1.8rem;font-size:.82rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;text-decoration:none;border-radius:8px;transition:all .2s;text-align:center}
.btn-cta:hover{background:var(--gl);transform:translateY(-2px)}
.btn-cta-outline{display:inline-block;background:transparent;color:rgba(255,255,255,.8);border:1.5px solid rgba(255,255,255,.3);padding:.78rem 1.8rem;font-size:.82rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;text-decoration:none;border-radius:8px;transition:all .2s;text-align:center}
.btn-cta-outline:hover{border-color:var(--gl);color:#fff;background:rgba(255,255,255,.07)}

/* CTA SCUOLE */
.cta-scuole-sec{background:linear-gradient(135deg,var(--gm) 0%,var(--gl) 100%);padding:4rem;text-align:center}
.cta-scuole-sec h2{font-family:'Inter',sans-serif;font-size:clamp(1.4rem,2.8vw,2rem);font-weight:800;color:#fff;margin-bottom:.9rem;line-height:1.2}
.cta-scuole-sec p{font-size:.95rem;color:rgba(255,255,255,.85);margin-bottom:2rem;line-height:1.75;max-width:520px;margin-left:auto;margin-right:auto}
.btn-white{background:#fff;color:var(--g);padding:.85rem 2.2rem;font-size:.9rem;font-weight:700;letter-spacing:.04em;text-decoration:none;border-radius:8px;transition:all .2s;display:inline-block}
.btn-white:hover{background:var(--cr);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15)}

/* FOOTER */
footer{background:var(--dn);color:rgba(255,255,255,.35);padding:1.8rem 4rem;display:flex;justify-content:space-between;align-items:center;font-size:.72rem;letter-spacing:.05em}
footer strong{color:rgba(255,255,255,.7)}
footer a{color:rgba(255,255,255,.35);text-decoration:none;transition:color .2s}
footer a:hover{color:var(--gl)}

/* LEAFLET TOOLTIP */
.leaflet-tooltip{font-family:'Inter',sans-serif;font-size:.78rem;border:none;border-radius:6px;box-shadow:0 2px 12px rgba(10,38,71,.15);padding:.4rem .7rem}

/* RESPONSIVE */
@media(max-width:900px){.stats-grid{grid-template-columns:1fr 1fr}.biologi-grid{grid-template-columns:1fr 1fr}.candidatura-inner{grid-template-columns:1fr}}
@media(max-width:860px){
  nav{padding:.8rem 1.2rem}.nav-links{display:none}
  .page-hero{padding:6rem 1.5rem 3.5rem}
  .stats-sec,.biologi-sec,.map-sec,.nota-sec,.candidatura-sec,.cta-scuole-sec{padding:2.5rem 1.5rem}
  footer{flex-direction:column;gap:.8rem;text-align:center;padding:1.5rem}
  .nota-box{flex-direction:column;gap:.8rem}
}
@media(max-width:600px){.stats-grid{grid-template-columns:1fr}.biologi-grid{grid-template-columns:1fr}#mappa-biologi{height:340px}}
</style>
</head>

// =====================
// MAPPA REGIONI
// =====================
let currentLang = 'it';
let geoLayer = null;
let leafletMap = null;

document.addEventListener('DOMContentLoaded', function() {
  leafletMap = L.map('mappa-biologi', { scrollWheelZoom: false }).setView([42.5, 12.5], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(leafletMap);

  fetch('https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_regions.geojson')
    .then(r => r.json())
    .then(data => {
      buildGeoLayer(data);
      setTimeout(() => leafletMap.invalidateSize(), 300);
      window._geojsonData = data;
    })
    .catch(() => {
      document.getElementById('mappa-biologi').insertAdjacentHTML('afterbegin',
        '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#5A6A7A;font-size:.9rem;position:relative;z-index:1">Mappa temporaneamente non disponibile</div>'
      );
    });
});

function isAttiva(feature) {
  const nome = feature.properties.reg_name || feature.properties.NAME_1 || '';
  return regioniAttive.some(r => nome.toLowerCase().includes(r.toLowerCase()));
}

function buildGeoLayer(data) {
  if (geoLayer) { leafletMap.removeLayer(geoLayer); }
  geoLayer = L.geoJSON(data, {
    style: feature => ({
      fillColor: isAttiva(feature) ? '#00A896' : '#94a3b8',
      fillOpacity: isAttiva(feature) ? 0.55 : 0.22,
      color: isAttiva(feature) ? '#007a6e' : '#64748b',
      weight: 1.2,
      opacity: 0.8
    }),
    onEachFeature: (feature, layer) => {
      const nome = feature.properties.reg_name || feature.properties.NAME_1 || '';
      const attiva = isAttiva(feature);
      layer.bindTooltip(() => {
        const t = T[currentLang];
        return `<strong>${nome}</strong><br><span style="font-size:.72rem;color:${attiva ? '#00A896' : '#94a3b8'}">${attiva ? t.map_tooltip_attivo : t.map_tooltip_espansione}</span>`;
      }, { sticky: true, direction: 'top', offset: [0, -4] });
      layer.on('mouseover', () => { if (!attiva) layer.setStyle({ fillOpacity: 0.38 }); });
      layer.on('mouseout', () => layer.setStyle({
        fillColor: attiva ? '#00A896' : '#94a3b8',
        fillOpacity: attiva ? 0.55 : 0.22
      }));
    }
  }).addTo(leafletMap);
}

// =====================
// RENDER PRINCIPALE
// =====================
function render(l) {
  currentLang = l;
  const t = T[l];
  document.documentElement.lang = l;

  document.querySelectorAll('[data-k]').forEach(el => {
    const k = el.getAttribute('data-k');
    if (k.startsWith('nav') && k !== 'nav_cta') {
      const i = parseInt(k.replace('nav', ''));
      if (!isNaN(i) && t.nav[i] !== undefined) { el.textContent = t.nav[i]; return; }
    }
    if (t[k] !== undefined) el.innerHTML = t[k];
  });

  document.querySelectorAll('.lb').forEach(b =>
    b.classList.toggle('active', b.textContent.toLowerCase() === l)
  );

  document.getElementById('req-list').innerHTML =
    t.req_items.map(i => `<li>${i}</li>`).join('');

  document.getElementById('cand-cta-btn').href = t.cand_cta_href;
  document.getElementById('cta-scuole-btn').href = t.cta_scuole_href;

  if (window._geojsonData && geoLayer) {
    buildGeoLayer(window._geojsonData);
  }
}

function setLang(l) { render(l); }

render('it');
</script>
