<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--dark:#0A2647;--teal:#00A896;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#f0f4f8;padding:24px;}

/* ===== SETUP ===== */
#setup{max-width:580px;margin:0 auto;}
.setup-card{background:white;border-radius:24px;padding:36px;box-shadow:0 4px 24px rgba(10,38,71,0.08);}
.setup-title{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:var(--dark);margin-bottom:24px;}
.form-label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;display:block;margin-top:16px;}
.form-input,.form-select{width:100%;border:1.5px solid #e2e8f0;border-radius:11px;padding:11px 14px;font-size:14px;outline:none;background:white;color:var(--dark);font-family:'Inter',sans-serif;}
.form-input:focus,.form-select:focus{border-color:var(--teal);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-gen{width:100%;background:var(--teal);color:white;border:none;border-radius:12px;padding:15px;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;letter-spacing:0.04em;cursor:pointer;margin-top:24px;transition:background 0.2s;}
.btn-gen:hover{background:#00C9B1;}
.tip{background:#f0fdf9;border:1px solid #a7f3d0;border-radius:12px;padding:14px 16px;margin-top:16px;font-size:12px;color:#065f46;line-height:1.6;}

/* ===== PRINT BAR ===== */
#printBar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--dark);
  padding:12px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  z-index:999;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
#printBar .pb-left{display:flex;align-items:center;gap:12px;}
#printBar .pb-title{color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;}
#printBar .pb-sub{color:rgba(255,255,255,0.5);font-size:11px;}
#printBar .btn-print{background:var(--teal);color:white;border:none;border-radius:10px;padding:10px 22px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.2s;}
#printBar .btn-print:hover{background:#00C9B1;}
#printBar .btn-back{background:rgba(255,255,255,0.1);color:white;border:none;border-radius:10px;padding:10px 18px;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:background 0.2s;}
#printBar .btn-back:hover{background:rgba(255,255,255,0.2);}

/* ===== PRINT ===== */
#printArea{display:none;}
@media print{
  #setup{display:none !important;}
  #printArea{display:block !important;}
  #printBar{display:none !important;}
  body{background:white;padding:0;margin:0;}
  .page-break{page-break-after:always;break-after:page;}
  @page{size:A4 portrait;margin:0;}
}

/* ===== FOGLIO A4 ===== */
.sheet{
  width:210mm;
  height:297mm;
  overflow:hidden;
  margin:0 auto 20px;
  background:white;
  padding:12mm 12mm 10mm;
  box-shadow:0 2px 20px rgba(0,0,0,0.12);
  position:relative;
  font-size:10pt;
  display:flex;
  flex-direction:column;
}

/* MARKER ANGOLI per Aspose OMR */
.marker{
  position:absolute;
  width:8mm;
  height:8mm;
  background:#000;
}
.marker-tl{top:5mm;left:5mm;}
.marker-tr{top:5mm;right:5mm;}
.marker-bl{bottom:5mm;left:5mm;}
.marker-br{bottom:5mm;right:5mm;}

/* HEADER */
.sheet-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding-bottom:7px;
  border-bottom:3px solid var(--dark);
  margin-bottom:7px;
  padding-top:2mm;
}
.header-center{flex:1;text-align:center;padding:0 10px;}
.header-title{
  font-family:'Nunito',sans-serif;
  font-size:16pt;
  font-weight:900;
  color:var(--dark);
  line-height:1.1;
  letter-spacing:-0.01em;
}
.header-sub{font-size:7.5pt;color:#64748b;margin-top:3px;}
.header-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:3px;margin-right:10mm;}
.qr-canvas{display:block;width:90px !important;height:90px !important;}
.qr-label{font-size:6.5pt;color:#64748b;font-weight:700;letter-spacing:0.06em;text-align:center;margin-top:2px;}

/* META BAR */
.meta-bar{
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr;
  gap:5px;
  margin-bottom:6px;
}
.meta-box{background:#f8fafc;border-radius:6px;padding:5px 8px;}
.meta-box-label{font-size:6.5pt;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;}
.meta-box-val{font-size:9pt;font-weight:700;color:var(--dark);margin-top:1px;}

/* BADGE TIPO */
.tipo-wrap{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.tipo-badge{
  display:inline-block;
  padding:3px 14px;
  border-radius:99px;
  font-size:8pt;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.1em;
}
.tipo-pre{background:#dbeafe;color:#1e40af;}
.tipo-post{background:#d1fae5;color:#065f46;}
.studente-box{
  display:flex;
  align-items:center;
  gap:8px;
  border:2px solid var(--dark);
  border-radius:8px;
  padding:4px 10px;
}
.studente-num{font-family:'Nunito',sans-serif;font-size:16pt;font-weight:900;color:var(--dark);min-width:32px;text-align:center;}
.studente-label{font-size:7pt;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;}

/* ISTRUZIONI */
.istruzioni{
  background:#fffbeb;
  border:1.5px solid #fde68a;
  border-radius:7px;
  padding:5px 10px;
  font-size:8pt;
  color:#92400e;
  margin-bottom:7px;
  line-height:1.4;
}

/* DATI GENERALI */
.dati-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:7px;}
.dati-field{border:1.5px solid #e2e8f0;border-radius:7px;padding:5px 9px;}
.dati-field-label{font-size:6.5pt;color:#94a3b8;text-transform:uppercase;font-weight:700;letter-spacing:0.08em;margin-bottom:3px;}
.dati-options{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.dati-opt{display:flex;align-items:center;gap:4px;font-size:8.5pt;font-family:'Inter',sans-serif;}

/* SEZIONI DOMANDE */
.section-title{
  font-family:'Nunito',sans-serif;
  font-size:8pt;
  font-weight:900;
  color:white;
  background:var(--teal);
  text-transform:uppercase;
  letter-spacing:0.1em;
  padding:3px 8px;
  border-radius:5px;
  margin:7px 0 4px;
  display:inline-block;
}

/* DOMANDE */
.question{margin-bottom:5px;}
.q-text{
  font-weight:700;
  font-size:9pt;
  color:var(--dark);
  margin-bottom:3px;
  text-transform:uppercase;
  letter-spacing:0.02em;
  font-family:'Inter',sans-serif;
}
.q-num{color:var(--teal);margin-right:4px;font-family:'Nunito',sans-serif;font-weight:900;}
.options{display:grid;gap:2px;}
.options.cols2{grid-template-columns:1fr 1fr;}
.options.cols4{grid-template-columns:1fr 1fr 1fr 1fr;}
.option{
  display:flex;
  align-items:center;
  gap:6px;
  padding:3px 7px;
  border:1.5px solid #e2e8f0;
  border-radius:6px;
  font-size:8.5pt;
  font-family:'Inter',sans-serif;
  text-transform:none;
}
.bubble{
  width:16px;
  height:16px;
  border-radius:50%;
  border:2px solid #475569;
  flex-shrink:0;
  display:block;
}

/* POST ONLY */
.post-only-wrap{
  background:#f0fdf9;
  border:1.5px solid #6ee7b7;
  border-radius:8px;
  padding:6px 9px;
  margin-top:6px;
}
.post-only-label{
  font-size:7pt;
  color:#065f46;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.1em;
  margin-bottom:4px;
}

/* FOOTER */
.sheet-footer{
  margin-top:auto;
  padding-top:6px;
  padding-left:12mm;
  padding-right:12mm;
  border-top:1px solid #e2e8f0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:6.5pt;
  color:#94a3b8;
  margin-bottom:6mm;
}

/* PAGINA 2 */
.pag2-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding-bottom:6px;
  border-bottom:2px solid var(--dark);
  margin-bottom:8px;
}
.pag2-title{font-family:'Nunito',sans-serif;font-size:11pt;font-weight:900;color:var(--dark);}
</style>
</head>
<body>

<!-- ===== PRINT BAR (hidden initially) ===== -->
<div id="printBar" style="display:none;">
  <div class="pb-left">
    <div>
      <div class="pb-title">📋 Questionari pronti</div>
      <div class="pb-sub" id="pbSub">Controlla i fogli, poi stampa o salva come PDF</div>
    </div>
  </div>
  <div style="display:flex;gap:10px;">
    <button class="btn-back" onclick="tornaSetup()">← Modifica</button>
    <button class="btn-print" onclick="window.print()">🖨 Stampa / Salva PDF</button>
  </div>
</div>

<!-- ===== SETUP ===== -->
<div id="setup">
  <div class="setup-card">
    <div class="setup-title">🖨 Generatore Questionari S.A.N.E.</div>

    <div class="row2">
      <div>
        <label class="form-label">Scuola</label>
        <input class="form-input" id="scuola" placeholder="es. I.C. Carducci-Fattori">
      </div>
      <div>
        <label class="form-label">Comune</label>
        <input class="form-input" id="comune" placeholder="es. Rosignano M.">
      </div>
    </div>

    <div class="row2">
      <div>
        <label class="form-label">Livello Scolastico</label>
        <select class="form-select" id="livello" onchange="aggiornaClassi()">
          <option value="A">Primaria (6-11 anni) — Versione A</option>
          <option value="B">Media (11-14 anni) — Versione B</option>
          <option value="C">Superiore (14-18 anni) — Versione C</option>
        </select>
      </div>
      <div>
        <label class="form-label">Classe</label>
        <select class="form-select" id="classe"></select>
      </div>
    </div>
    <div style="margin-top:8px;">
      <label class="form-label">Sezione</label>
      <input class="form-input" id="sezione" placeholder="es. A, B, C..." maxlength="3" style="text-transform:uppercase;">
    </div>

    <div class="row2">
      <div>
        <label class="form-label">Tipo</label>
        <select class="form-select" id="tipo">
          <option value="PRE">PRE — Prima della lezione</option>
          <option value="POST">POST — Dopo la lezione</option>
        </select>
      </div>
      <div>
        <label class="form-label">Numero Studenti</label>
        <input class="form-input" type="number" id="nStudenti" value="22" min="1" max="35">
      </div>
    </div>

    <div>
      <label class="form-label">Codice Sessione (dal portale)</label>
      <input class="form-input" id="codiceSessione" placeholder="es. SANE-2026-AWRX">
    </div>

    <button class="btn-gen" onclick="genera()">⬇ Genera e Stampa Questionari</button>

    <div class="tip" id="tipBox">
      💡 Verranno generati <strong id="tipNum">22</strong> fogli per <strong id="tipLivello">Primaria</strong> —
      con QR code, numero studente e marker di allineamento già stampati.
      Se le domande sforano una pagina, viene generata automaticamente la <strong>Pagina 2</strong>.
    </div>
  </div>
</div>

<!-- ===== AREA STAMPA ===== -->
<div id="printArea"></div>

<script>
// Classi per livello
const CLASSI_OPTIONS = {
  A: ['1ª','2ª','3ª','4ª','5ª'],
  B: ['1ª Media','2ª Media','3ª Media'],
  C: ['1ª Superiore','2ª Superiore','3ª Superiore','4ª Superiore','5ª Superiore'],
};

function aggiornaClassi(){
  const lv = document.getElementById('livello').value;
  const sel = document.getElementById('classe');
  sel.innerHTML = CLASSI_OPTIONS[lv].map(c=>`<option value="${c}">${c}</option>`).join('');
  aggiornaTip();
}

// Aggiorna tip
document.getElementById('nStudenti').addEventListener('input', aggiornaTip);
document.getElementById('livello').addEventListener('change', aggiornaTip);
function aggiornaTip(){
  document.getElementById('tipNum').textContent = document.getElementById('nStudenti').value;
  const lv = {A:'Primaria',B:'Media',C:'Superiore'};
  document.getElementById('tipLivello').textContent = lv[document.getElementById('livello').value];
}

// Init classi al caricamento
aggiornaClassi();

// ===== DATI DOMANDE =====
const SEZIONI = [
  {
    titolo:'CONOSCENZE NUTRIZIONALI',
    domande:[
      {n:'1', testo:'IL PIATTO SANO È COMPOSTO DA:', cols:2, opzioni:[
        '50% frutta e verdura, 25% proteine, 25% carboidrati',
        '50% carne, 50% carboidrati',
        'Solo carboidrati',
        'Non so'
      ]},
      {n:'2', testo:"QUAL È LA SCELTA PIÙ BILANCIATA AL MATTINO?", cols:2, opzioni:[
        'Cereali integrali + yogurt',
        'Snack confezionati',
        'Bevande zuccherate',
        'Non so'
      ]},
      {n:'3', testo:"L'ACQUA È IMPORTANTE PERCHÉ:", cols:2, opzioni:[
        'Idrata il corpo',
        'Fa ingrassare meno',
        'Sostituisce il cibo',
        'Non so'
      ]},
    ]
  },
  {
    titolo:'ABITUDINI ALIMENTARI',
    domande:[
      {n:'4', testo:'CON CHE FREQUENZA FAI COLAZIONE?', cols:2, opzioni:[
        'Tutti i giorni',
        '3-5 volte / settimana',
        '1-2 volte / settimana',
        'Mai'
      ]},
      {n:'5', testo:'MANGI FRUTTA E VERDURA:', cols:2, opzioni:[
        'Ogni giorno',
        'Spesso',
        'Raramente',
        'Mai'
      ]},
      {n:'6', testo:'BEVI BEVANDE ZUCCHERATE:', cols:2, opzioni:[
        'Mai',
        '1-2 volte / settimana',
        '3-5 volte / settimana',
        'Tutti i giorni'
      ]},
    ]
  },
  {
    titolo:'ALLERGIE ALIMENTARI',
    domande:[
      {n:'7', testo:"UN'ALLERGIA ALIMENTARE È:", cols:2, opzioni:[
        'Una reazione del sistema immunitario',
        'Un gusto personale',
        'Una intolleranza lieve',
        'Non so'
      ]},
      {n:'8', testo:'CON UN COMPAGNO ALLERGICO:', cols:2, opzioni:[
        'Non condivido gli alimenti',
        'Condivido comunque',
        'Non so cosa fare',
        'Non mi interessa'
      ]},
    ]
  },
  {
    titolo:'ATTIVITÀ FISICA',
    domande:[
      {n:'9', testo:'QUANTI GIORNI A SETTIMANA PRATICHI ATTIVITÀ FISICA?', cols:2, opzioni:[
        '5 o più giorni',
        '3-4 giorni',
        '1-2 giorni',
        'Nessuno'
      ]},
    ]
  }
];

const EXTRA_B = [
  {n:'10', testo:"SAI LEGGERE UN'ETICHETTA ALIMENTARE?", cols:2, opzioni:[
    'Sì, facilmente','In parte','No','Non so'
  ]},
  {n:'11', testo:'PRIMA DEL PROGRAMMA CONOSCEVI QUESTI ARGOMENTI?', cols:2, opzioni:[
    'Sì','In parte','No','—'
  ]},
];

const EXTRA_C = [
  {n:'12', testo:'HAI MAI MODIFICATO LA DIETA PER SALUTE O SCELTA ETICA?', cols:2, opzioni:[
    'Sì','Ci sto pensando','No','—'
  ]},
  {n:'13', testo:'PENSI CHE LA SCUOLA DOVREBBE FARE PIÙ EDUCAZIONE ALIMENTARE?', cols:2, opzioni:[
    'Sì, molto','UN PO\'','È SUFFICIENTE','No'
  ]},
];

const POST_ONLY = {
  A: [{n:'10', testo:'DOPO IL PROGRAMMA HAI CAMBIATO LE TUE ABITUDINI?', cols:2, opzioni:['Sì, molto','UN PO\'','No','—']}],
  B: [{n:'12', testo:'DOPO IL PROGRAMMA HAI CAMBIATO LE TUE ABITUDINI?', cols:2, opzioni:['Sì, molto','UN PO\'','No','—']}],
  C: [{n:'14', testo:'DOPO IL PROGRAMMA HAI CAMBIATO LE TUE ABITUDINI?', cols:2, opzioni:['Sì, molto','UN PO\'','No','—']}],
};

// ===== CLASSI PER LIVELLO =====
const CLASSI_LIVELLO = {
  A: ['1ª','2ª','3ª','4ª','5ª'],
  B: ['1ª MEDIA','2ª MEDIA','3ª MEDIA'],
  C: ['1ª SUPERIORE','2ª SUPERIORE','3ª SUPERIORE','4ª SUPERIORE','5ª SUPERIORE'],
};

// ===== BUILD DOMANDA =====
function buildDomanda(d){
  const wrap = document.createElement('div');
  wrap.className = 'question';
  const colClass = d.cols === 4 ? 'cols4' : 'cols2';
  wrap.innerHTML = `
    <div class="q-text"><span class="q-num">${d.n}.</span>${d.testo}</div>
    <div class="options ${colClass}">
      ${d.opzioni.map(o=>`
        <div class="option">
          <span class="bubble"></span>
          <span>${o}</span>
        </div>`).join('')}
    </div>`;
  return wrap;
}

// ===== GENERA QR =====
function generaQR(canvasEl, data){
  canvasEl.width = 90;
  canvasEl.height = 90;
  new QRious({
    element: canvasEl,
    value: data,
    size: 90,
    foreground: '#0A2647',
    background: '#ffffff',
    level: 'M'
  });
}

// ===== GENERA FOGLI =====
function tornaSetup(){
  document.getElementById('setup').style.display='block';
  document.getElementById('printArea').style.display='none';
  document.getElementById('printBar').style.display='none';
  document.getElementById('printArea').innerHTML='';
  window.scrollTo(0,0);
}

function genera(){
  const scuola = document.getElementById('scuola').value.trim() || 'Istituto';
  const comune = document.getElementById('comune').value.trim() || '';
  const classeVal = document.getElementById('classe').value.trim() || '—';
  const sezioneVal = document.getElementById('sezione').value.trim().toUpperCase();
  const classe = sezioneVal ? classeVal + ' ' + sezioneVal : classeVal;
  const livello = document.getElementById('livello').value;
  const tipo = document.getElementById('tipo').value;
  const n = parseInt(document.getElementById('nStudenti').value) || 22;
  const codice = document.getElementById('codiceSessione').value.trim() || 'SANE-2026-XXXX';
  const data = new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  const lvLabel = {A:'Primaria (6-11 anni)',B:'Media (11-14 anni)',C:'Superiore (14-18 anni)'};
  const area = document.getElementById('printArea');
  area.innerHTML = '';

  // Costruisci lista TUTTE le domande poi splitta: 1-8 in pag1, resto in pag2
  let tuttiDom = [];

  // Base sempre presente (9 domande)
  SEZIONI.forEach(s => s.domande.forEach(d => tuttiDom.push({...d, _sezione: s.titolo})));

  // Extra B
  if(livello === 'B' || livello === 'C'){
    EXTRA_B.forEach(d => tuttiDom.push({...d, _sezione:'CONOSCENZE AGGIUNTIVE'}));
  }
  // Extra C
  if(livello === 'C'){
    EXTRA_C.forEach(d => tuttiDom.push({...d, _sezione:'RIFLESSIONE PERSONALE'}));
  }
  // POST only
  if(tipo === 'POST'){
    POST_ONLY[livello].forEach(d => tuttiDom.push({...d, _sezione:'IMPATTO (SOLO POST)'}));
  }

  // SPLIT FISSO: pagina 1 = domande 1-8, pagina 2 = domande 9+
  const domPag1 = tuttiDom.slice(0, 8);
  const domPag2 = tuttiDom.slice(8);
  const hasPag2 = domPag2.length > 0;

  for(let i=1; i<=n; i++){
    const numStr = String(i).padStart(2,'0');
    const totStr = String(n).padStart(2,'0');

    // ===== PAGINA 1 =====
    const sheet1 = document.createElement('div');
    sheet1.className = 'sheet' + (hasPag2 || i<n ? ' page-break' : '');

    const qrData1 = `${codice}|${scuola}|${classe}|${tipo}|${numStr}|P1`;
    const canvasId1 = `qr1-${i}`;

    sheet1.innerHTML = `
      <div class="marker marker-tl"></div>
      <div class="marker marker-tr"></div>
      <div class="marker marker-bl"></div>
      <div class="marker marker-br"></div>

      <div class="sheet-header">
        <div style="width:85px;flex-shrink:0;"></div>
        <div class="header-center">
          <div class="header-title">Mangiare Bene, Crescere Meglio</div>
          <div class="header-sub">S.A.N.E. Italia · Programma di Educazione Alimentare</div>
        </div>
        <div class="header-right">
          <canvas id="${canvasId1}" class="qr-canvas"></canvas>
          <div class="qr-label">${codice}</div>
        </div>
      </div>

      <div class="meta-bar">
        <div class="meta-box"><div class="meta-box-label">Scuola</div><div class="meta-box-val">${scuola}</div></div>
        <div class="meta-box"><div class="meta-box-label">Classe</div><div class="meta-box-val">${classe}</div></div>
        <div class="meta-box"><div class="meta-box-label">Data</div><div class="meta-box-val">${data}</div></div>
        <div class="meta-box"><div class="meta-box-label">Versione</div><div class="meta-box-val">${lvLabel[livello]}</div></div>
      </div>

      <div class="tipo-wrap">
        <span class="tipo-badge tipo-${tipo.toLowerCase()}">📋 QUESTIONARIO ${tipo} ${hasPag2 ? '— PAGINA 1 DI 2' : ''}</span>
        <div class="studente-box">
          <div class="studente-label">STUDENTE</div>
          <div class="studente-num">${numStr}</div>
          <div class="studente-label">DI ${totStr}</div>
        </div>
      </div>

      <div class="istruzioni">
        📌 <strong>ISTRUZIONI:</strong> COLORA COMPLETAMENTE IL CERCHIO ○ ACCANTO ALLA RISPOSTA CHE RITIENI CORRETTA.
        UNA SOLA RISPOSTA PER DOMANDA. SE SBAGLI, CANCELLA COMPLETAMENTE IL CERCHIO E RICOLORA QUELLO GIUSTO.
      </div>

      <div class="dati-row">
        <div class="dati-field">
          <div class="dati-field-label">CLASSE</div>
          <div class="dati-options">
            ${CLASSI_LIVELLO[livello].map(c=>`<span class="dati-opt"><span class="bubble" style="width:14px;height:14px;border:2px solid #475569;border-radius:50%;display:inline-block;flex-shrink:0;"></span> ${c}</span>`).join('')}
          </div>
        </div>
        <div class="dati-field">
          <div class="dati-field-label">SESSO</div>
          <div class="dati-options">
            <span class="dati-opt"><span class="bubble" style="width:14px;height:14px;border:2px solid #475569;border-radius:50%;display:inline-block;flex-shrink:0;"></span> M</span>
            <span class="dati-opt"><span class="bubble" style="width:14px;height:14px;border:2px solid #475569;border-radius:50%;display:inline-block;flex-shrink:0;"></span> F</span>
            <span class="dati-opt"><span class="bubble" style="width:14px;height:14px;border:2px solid #475569;border-radius:50%;display:inline-block;flex-shrink:0;"></span> NON INDICO</span>
          </div>
        </div>
      </div>

      <div id="domande1-${i}"></div>

      <div class="sheet-footer">
        <span>Mangiare Bene, Crescere Meglio · v1.0 · Dott.ssa Serafina Cardaci + Patrick Orlando · S.A.N.E. Italia</span>
        <span>STUDENTE ${numStr}/${totStr} · ${tipo} · ${codice} ${hasPag2 ? '· PAG. 1/2' : ''}</span>
      </div>`;

    area.appendChild(sheet1);

    // Riempi domande pagina 1
    const d1box = sheet1.querySelector(`#domande1-${i}`);
    let sezioneCorrente = '';
    domPag1.forEach(d => {
      if(d._sezione !== sezioneCorrente){
        sezioneCorrente = d._sezione;
        const st = document.createElement('div');
        st.className = 'section-title';
        st.textContent = d._sezione;
        if(d._sezione === 'IMPATTO (SOLO POST)'){
          const pw = document.createElement('div');
          pw.className = 'post-only-wrap';
          const pl = document.createElement('div');
          pl.className = 'post-only-label';
          pl.textContent = '✦ SOLO PER IL QUESTIONARIO POST';
          pw.appendChild(pl);
          pw.appendChild(st);
          pw.appendChild(buildDomanda(d));
          d1box.appendChild(pw);
          return;
        }
        d1box.appendChild(st);
      }
      d1box.appendChild(buildDomanda(d));
    });

    // ===== PAGINA 2 (se serve) =====
    if(hasPag2){
      const sheet2 = document.createElement('div');
      sheet2.className = 'sheet' + (i<n ? ' page-break' : '');
      const qrData2 = `${codice}|${scuola}|${classe}|${tipo}|${numStr}|P2`;
      const canvasId2 = `qr2-${i}`;

      sheet2.innerHTML = `
        <div class="marker marker-tl"></div>
        <div class="marker marker-tr"></div>
        <div class="marker marker-bl"></div>
        <div class="marker marker-br"></div>

        <div class="pag2-header">
          <div style="width:85px;flex-shrink:0;"></div>
          <div class="header-center">
            <div class="pag2-title">Mangiare Bene, Crescere Meglio — PAG. 2/2</div>
            <div class="header-sub">S.A.N.E. Italia · ${codice} · ${tipo} · STUDENTE ${numStr}/${totStr}</div>
          </div>
          <div class="header-right">
            <canvas id="${canvasId2}" class="qr-canvas"></canvas>
            <div class="qr-label">${codice} · P2</div>
          </div>
        </div>

        <div class="tipo-wrap">
          <span class="tipo-badge tipo-${tipo.toLowerCase()}">📋 QUESTIONARIO ${tipo} — PAGINA 2 DI 2</span>
          <div class="studente-box">
            <div class="studente-label">STUDENTE</div>
            <div class="studente-num">${numStr}</div>
            <div class="studente-label">DI ${totStr}</div>
          </div>
        </div>

        <div class="istruzioni">
          📌 <strong>CONTINUA DAL FOGLIO PRECEDENTE.</strong> COLORA IL CERCHIO ACCANTO ALLA RISPOSTA CORRETTA. UNA SOLA RISPOSTA PER DOMANDA.
        </div>

        <div id="domande2-${i}"></div>

        <div class="sheet-footer">
          <span>Mangiare Bene, Crescere Meglio · v1.0 · Dott.ssa Serafina Cardaci + Patrick Orlando · S.A.N.E. Italia</span>
          <span>STUDENTE ${numStr}/${totStr} · ${tipo} · ${codice} · PAG. 2/2</span>
        </div>`;

      area.appendChild(sheet2);

      const d2box = sheet2.querySelector(`#domande2-${i}`);
      let sez2 = '';
      domPag2.forEach(d => {
        if(d._sezione !== sez2){
          sez2 = d._sezione;
          const st = document.createElement('div');
          st.className = 'section-title';
          st.textContent = d._sezione;
          if(d._sezione === 'IMPATTO (SOLO POST)'){
            const pw = document.createElement('div');
            pw.className = 'post-only-wrap';
            const pl = document.createElement('div');
            pl.className = 'post-only-label';
            pl.textContent = '✦ SOLO PER IL QUESTIONARIO POST';
            pw.appendChild(pl);
            pw.appendChild(st);
            pw.appendChild(buildDomanda(d));
            d2box.appendChild(pw);
            return;
          }
          d2box.appendChild(st);
        }
        d2box.appendChild(buildDomanda(d));
      });
    }
  }

  // Genera tutti i QR code con QRious — formato completo
  // Formato: SANE|codice|studente|pagina|tipo|versione|scuola(max20)|classe|comune(max15)|data
  const scuolaShort = scuola.replace(/[^a-zA-Z0-9]/g,'').substring(0,20);
  const comuneShort = comune.replace(/[^a-zA-Z0-9]/g,'').substring(0,15);
  const classeShort = classe.replace(/[^a-zA-Z0-9]/g,'').substring(0,6);
  const dataQR = new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'');

  for(let i=1; i<=n; i++){
    const numStr = String(i).padStart(2,'0');
    const totStr = String(n).padStart(2,'0');
    const qrBase = `SANE|${codice}|${numStr}/${totStr}|${tipo}|${livello}|${scuolaShort}|${classeShort}|${comuneShort}|${dataQR}`;
    const c1 = document.getElementById(`qr1-${i}`);
    if(c1) generaQR(c1, `${qrBase}|P1`);
    if(hasPag2){
      const c2 = document.getElementById(`qr2-${i}`);
      if(c2) generaQR(c2, `${qrBase}|P2`);
    }
  }

  // Mostra anteprima
  document.getElementById('setup').style.display='none';
  document.getElementById('printArea').style.display='block';
  document.getElementById('printBar').style.display='flex';
  const totFogli = hasPag2 ? n*2 : n;
  document.getElementById('pbSub').textContent = `${n} studenti · ${totFogli} fogli totali · Scorri per controllare, poi stampa`;
  window.scrollTo(0,0);
}
</script>
</body>
</html>
