// =====================
// STATS
// =====================
const totScuole = scuoleAderenti.length;
const totBambini = scuoleAderenti.reduce((a, s) => a + (s.bambini || 0), 0);
const valsM = scuoleAderenti.map(s => s.miglioramentoPrePost).filter(v => v !== null);
const mediaM = valsM.length ? Math.round(valsM.reduce((a, b) => a + b, 0) / valsM.length) : 0;

function animateCounter(el, target, suffix) {
  let v = 0;
  const step = Math.ceil(target / 60);
  const t = setInterval(() => {
    v += step;
    if (v >= target) { v = target; clearInterval(t); }
    el.innerHTML = v + suffix;
  }, 16);
}

const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      animateCounter(document.getElementById('counter-scuole'), totScuole, '');
      animateCounter(document.getElementById('counter-bambini'), totBambini, '');
      const mEl = document.getElementById('counter-migliora');
      let v = 0;
      const step = Math.ceil(mediaM / 60);
      const t = setInterval(() => {
        v += step;
        if (v >= mediaM) { v = mediaM; clearInterval(t); }
        mEl.innerHTML = v + '<span class="stat-unit">%</span>';
      }, 16);
      obs.disconnect();
    }
  });
}, { threshold: 0.3 });
obs.observe(document.querySelector('.stats-sec'));

// =====================
// MAPPA LEAFLET
// =====================
let leafletMap = null;
let currentLang = 'it';

function formatData(str, lang) {
  if (!str) return T[lang].labels.nd;
  const [y, m] = str.split('-');
  const mesiIT = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  const mesiES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const mesiEN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const mesi = lang === 'es' ? mesiES : lang === 'en' ? mesiEN : mesiIT;
  return mesi[parseInt(m, 10) - 1] + ' ' + y;
}

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:18px;height:18px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)"></div>`,
    iconSize: [18, 18], iconAnchor: [9, 9], popupAnchor: [0, -12]
  });
}

document.addEventListener('DOMContentLoaded', function() {
  leafletMap = L.map('mappa-italia', { scrollWheelZoom: false }).setView([42.5, 12.5], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(leafletMap);

  const iconCompleto = makeIcon('#00A896');
  const iconKit = makeIcon('#3b82f6');

  scuoleAderenti.forEach(s => {
    const icon = s.tipoAdesione === 'completo' ? iconCompleto : iconKit;
    const marker = L.marker([s.lat, s.lng], { icon }).addTo(leafletMap);
    marker.bindPopup(() => {
      const t = T[currentLang];
      const lb = t.labels;
      const badgeClass = s.tipoAdesione === 'completo' ? 'completo' : 'kit';
      const badgeTxt = s.tipoAdesione === 'completo' ? lb.tipo_completo : lb.tipo_kit;
      return `
        <div class="popup-nome">${s.nome}</div>
        <div class="popup-luogo">📍 ${s.comune} (${s.provincia}) · ${s.regione}</div>
        <span class="popup-badge ${badgeClass}">${badgeTxt}</span>
        <div class="popup-meta">
          <span><strong>${lb.popup_bambini}:</strong> ${s.bambini !== null ? s.bambini : lb.nd}</span>
          <span><strong>${lb.popup_classi}:</strong> ${s.classi}</span>
          <span><strong>${lb.popup_attivazione}:</strong> ${formatData(s.dataAttivazione, currentLang)}</span>
          ${s.miglioramentoPrePost !== null ? `<span><strong>${lb.miglioramento}:</strong> +${s.miglioramentoPrePost}%</span>` : ''}
        </div>
      `;
    }, { maxWidth: 260 });
  });

  setTimeout(() => leafletMap.invalidateSize(), 300);
});

// RENDER
// =====================
function renderScuole(t) {
  const lb = t.labels;
  document.getElementById('scuole-grid').innerHTML = scuoleAderenti.map(s => {
    const isCompleto = s.tipoAdesione === 'completo';
    const topBg = isCompleto
      ? 'linear-gradient(135deg,#0A2647,#00A896)'
      : 'linear-gradient(135deg,#0A2647,#3b82f6)';
    const badgeClass = isCompleto ? 'completo' : 'kit';
    const badgeTxt = isCompleto ? lb.tipo_completo : lb.tipo_kit;
    const icon = isCompleto ? '🎓' : '📦';
    const classiLabel = s.classi === 1 ? lb.classi : lb.classi_pl;

    return `
      <div class="scuola-card">
        <div class="scuola-card-top" style="background:${topBg}">
          <span>${icon}</span>
          <span class="scuola-badge ${badgeClass}">${badgeTxt}</span>
        </div>
        <div class="scuola-body">
          <div class="scuola-nome">${s.nome}</div>
          <div class="scuola-luogo">📍 ${s.comune} (${s.provincia}) · ${s.regione}</div>
          <div class="scuola-meta">
            ${s.bambini !== null ? `<div class="scuola-meta-row">👧 <strong>${s.bambini}</strong> ${lb.bambini}</div>` : ''}
            <div class="scuola-meta-row">🏛️ <strong>${s.classi}</strong> ${classiLabel} ${lb.aderente}</div>
            <div class="scuola-meta-row">📅 ${lb.attivazione}: <strong>${formatData(s.dataAttivazione, currentLang)}</strong></div>
            ${s.miglioramentoPrePost !== null ? `<div class="scuola-meta-row">📈 ${lb.miglioramento}: <strong>+${s.miglioramentoPrePost}%</strong></div>` : ''}
            ${s.raccomandazioneInsegnanti !== null ? `<div class="scuola-meta-row">⭐ ${lb.raccomandazione}: <strong>${s.raccomandazioneInsegnanti}%</strong></div>` : ''}
          </div>
          ${s.testimonianza ? `<div class="scuola-testimonianza">"${s.testimonianza}"</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function renderAderire(t) {
  document.getElementById('aderire-grid').innerHTML = t.modalita.map(m => `
    <div class="aderire-card ${m.classe || m.clase}-card">
      <div class="aderire-icon">${m.icona}</div>
      <div class="aderire-tipo">${m.tipo}</div>
      <div class="aderire-nome">${m.nome}</div>
      <p class="aderire-desc-card">${m.desc}</p>
      <div class="aderire-include-title">${m.include_title}</div>
      <ul class="aderire-items">${m.items.map(i => `<li>${i}</li>`).join('')}</ul>
      <div class="aderire-ideale">${m.ideale}</div>
      <a href="${m.mailto}" class="aderire-cta">${m.cta}</a>
    </div>
  `).join('');
}

function render(l) {
  currentLang = l;
  const t = T[l];
  document.documentElement.lang = l;

  document.querySelectorAll('[data-k]').forEach(el => {
    const k = el.getAttribute('data-k');
    if (k.startsWith('nav') && k !== 'nav_cta') {
      const i = parseInt(k.replace('nav', ''));
      if (!isNaN(i) && t.nav[i] !== undefined) { el.textContent = t.nav[i]; return; }
    }
    if (t[k] !== undefined) el.innerHTML = t[k];
  });

  document.querySelectorAll('.lb').forEach(b =>
    b.classList.toggle('active', b.textContent.toLowerCase() === l)
  );

  document.getElementById('cta-btn1').href = t.cta_btn1_href;

  renderScuole(t);
  renderAderire(t);
}

function setLang(l) { render(l); }

render('it');
